# ============================================================
#  DakarPark — Configuration de l'analyse SonarQube
# ============================================================

sonar.projectKey=dakarpark-frontend
sonar.projectName=DakarPark — Frontend Angular
sonar.projectVersion=1.0

# Sources à analyser
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/.angular/**

# Encodage
sonar.sourceEncoding=UTF-8

# URL du serveur SonarQube (modifier si nécessaire)
sonar.host.url=http://localhost:9000
